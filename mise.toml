[tools]
rust = "1.96.1"
node = "lts"
bun = "latest"
yq = "latest"
jq = "latest"
shellcheck = "latest"
hk = "latest"
pkl = "latest"
markdownlint-cli2 = "latest"
cargo-dist = "0.28.0"

[env]
# Wrap hk-invoked git hooks in `mise x` so pinned tools (bun, node, yq,
# shellcheck, markdownlint-cli2, rust/cargo) are on PATH without shell
# activation.
HK_MISE = "1"

[hooks]
# After tools are installed, wire up the git hooks (idempotent).
postinstall = "hk install"
# On entering the project, ensure deps are installed. On first run this
# triggers postinstall (which installs the git hooks); afterwards it is a
# no-op since the tools are already present.
enter = "mise install -q"

[tasks.setup]
description = "Install project dependencies and git hooks"
run = ["bun install", "hk install"]

# Lint all markdown directly (git-independent; covers gitignored paths too)
[tasks.lint]
run = "markdownlint-cli2 '**/*.md'"

[tasks.lint-fix]
run = "markdownlint-cli2 --fix '**/*.md'"
