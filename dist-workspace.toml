# cargo-dist workspace configuration (finalized in A5).
#
# Distribution shape: Unix-first (macOS + Linux), `curl | sh` shell installer,
# per-tool release tags ('<tool>-v<semver>'). Finalized in A5 via `dist init`;
# validated locally with `dist plan --tag skill-auditor-v0.1.0`. cargo-dist is
# pinned in mise.toml. The generated `.github/workflows/release.yml` is owned by
# dist except for a documented tag-trigger narrowing (see `allow-dirty` below).
# Windows is deferred (add "x86_64-pc-windows-msvc" to `targets` later).

[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.28.0"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# CI backends to support
ci = "github"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
# Allow the generated CI (`release.yml`) to carry a manual edit without dist
# treating it as out of date: the tag trigger is narrowed to the '<tool>-v<semver>'
# namespace per the R1 versioning policy so skill releases never trigger tool
# releases. Re-apply that narrowing if `dist generate` is ever re-run.
allow-dirty = ["ci"]
