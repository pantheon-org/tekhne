# cargo-dist workspace configuration (finalized in A5).
#
# Distribution shape: Unix-first (macOS + Linux), `curl | sh` shell installer,
# tool releases under the 'tool/' tag namespace (see `tag-namespace` below).
# Finalized in A5 via `dist init`; validated locally with
# `dist plan --tag tool/skill-auditor-v0.1.0`. cargo-dist is pinned in mise.toml.
# The generated workflow is `.github/workflows/tool-release.yml`, fully owned and
# regenerated by dist (no manual edits). Windows is deferred (add
# "x86_64-pc-windows-msvc" to `targets` later).

[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# The installers to generate for each app
installers = ["shell"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# CI backends to support
ci = "github"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
# Tag namespace for tool-crate releases (R1 versioning policy). With this set,
# dist expects tags of the form 'tool/<package>-v<semver>' (e.g.
# 'tool/skill-auditor-v0.1.0') and generates a workflow that triggers only on
# the 'tool/' prefix. release-please tags skills as plain 'v<semver>', so the two
# tag namespaces are disjoint and a skill release never triggers a tool release.
# This is config-driven: dist owns and regenerates the workflow, no manual edit.
tag-namespace = "tool"
# Do not run the release workflow on pull requests. The default PR "plan" job
# sits QUEUED on every PR and holds it at mergeStateStatus=UNSTABLE. Tool
# releases only ever happen on a 'tool/*-v*' tag push, so the PR dry-run adds
# noise without value; skip it so PRs settle to CLEAN.
pr-run-mode = "skip"

# Runner overrides. cargo-dist 0.28's default `ubuntu-20.04` runner was retired
# by GitHub, so the release jobs queued forever. Pin the global jobs and the
# Linux build targets to `ubuntu-22.04` (macOS targets use the macOS runners).
[dist.github-custom-runners]
global = "ubuntu-22.04"
aarch64-unknown-linux-gnu = "ubuntu-22.04"
x86_64-unknown-linux-gnu = "ubuntu-22.04"
aarch64-apple-darwin = "macos-latest"
x86_64-apple-darwin = "macos-latest"

# Pin the GitHub Actions dist generates to exact commit SHAs instead of floating
# tags (dist >= 0.29 feature), matching this repo's SHA-pinning convention and
# .plumber.yaml's actionsMustBePinnedByCommitSha. dist emits `<action>@<sha>`;
# keep the `# vX` comment here so the pin stays human-readable and Dependabot can
# still bump it. Refresh these when bumping cargo-dist (new default tags) or when
# Dependabot proposes a newer action release. See issue #227.
[dist.github-action-commits]
"actions/checkout" = "d23441a48e516b6c34aea4fa41551a30e30af803"       # v6
"actions/upload-artifact" = "043fb46d1a93c77aae656e7c1c64a875d1fc6a0a" # v7
"actions/download-artifact" = "3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c" # v8
