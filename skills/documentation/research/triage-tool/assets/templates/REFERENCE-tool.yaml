template_name: reference-tool
description: Structured reference summary for a tool or library triaged into the research repo
filename_pattern: "references/<slug>.md"
schema: "../schemas/reference-tool.schema.json"

frontmatter:
  required_fields:
    - name: title
      type: string
      description: Tool or library name
      example: "MemGPT"

    - name: author
      type: string
      description: Author or organisation
      example: "Packer et al. / Stanford"

    - name: date
      type: date
      format: "YYYY-MM-DD"
      description: Date first triaged (today) or last significant release date

    - name: type
      type: enum
      values: [reference]
      description: Must be "reference"

    - name: tags
      type: array
      description: Must include "tool" plus one or more topic tags appropriate to the research domain
      validation: Must contain "tool"
      example:
        - tool
        - library
        - cli

    - name: source
      type: string
      format: url
      description: Primary landing page (GitHub / docs / npm / PyPI)
      example: "https://github.com/cpacker/MemGPT"

  optional_fields:
    - name: source_repo
      type: string
      format: url
      description: GitHub repository URL if source is not already the repo

    - name: local_clone
      type: string
      description: Relative path to a local clone of the tool
      example: "../tools/memgpt"

    - name: version
      type: string
      description: vX.Y.Z / commit SHA when triaged
      example: "v0.3.17"

    - name: context
      type: string
      description: Why we care; what synthesis bucket this supports

    - name: related
      type: array
      items: string
      description: Relative paths to related ANALYSIS-*.md files

sections:
  required:
    - heading: "TL;DR"
      marker: "## TL;DR"
      description: 3-8 bullets capturing what the tool does and why it matters
      constraints:
        format: bullet-list
        min_bullets: 3
        max_bullets: 8

    - heading: "What's novel / different"
      marker: "## What's novel / different"
      description: One paragraph — what does this do that adjacent tools do not?

    - heading: "Architecture overview"
      marker: "## Architecture overview"
      description: Technical design broken into subsections; mark N/A for non-applicable subsections
      subsections:
        - heading: "Core design"
          marker: "### Core design"
        - heading: "Interface / API"
          marker: "### Interface / API"
        - heading: "Dependencies"
          marker: "### Dependencies"
        - heading: "Scope / limitations"
          marker: "### Scope / limitations"

    - heading: "Deployment model"
      marker: "## Deployment model"
      description: Runtime, language, dependencies, storage

    - heading: "Benchmarks / self-reported metrics"
      marker: "## Benchmarks / self-reported metrics"
      description: Numbers quoted with source; unverified claims marked "as reported"

    - heading: "Open questions / risks / missing details"
      marker: "## Open questions / risks / missing details"
      description: Gaps, risks, unverified claims, missing benchmarks; bullet list

  optional:
    - heading: "Notes"
      marker: "## Notes"
      description: Corrections, updates, follow-up pointers

validation:
  script: "../../scripts/validate-reference-tool.sh"
  required_checks:
    - "YAML frontmatter present and valid"
    - "Required fields: title, author, date, type, tags, source"
    - "type == reference"
    - "tags contains tool"
    - "source matches https?://"
    - "Required sections present"
    - "TL;DR contains 3-8 bullet lines"
    - "No unfilled angle-bracket placeholders"
