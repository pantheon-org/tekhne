template_name: analysis-tool
description: 3-stage deep-dive analysis of a tool or library promoted from REVIEWED.md in the research repo
filename_pattern: "ANALYSIS-<slug>.md"
schema: "../schemas/analysis-tool.schema.json"

frontmatter:
  required_fields:
    - name: slug
      type: string
      description: Identifier matching the filename stem after "ANALYSIS-" (always author-or-org-tool-name)
      example: "cpacker-memgpt"

    - name: title
      type: string
      description: Short analysis title
      example: "Analysis — MemGPT"

    - name: date
      type: date
      format: "YYYY-MM-DD"
      description: Date the analysis was written

    - name: type
      type: enum
      values: [analysis]
      description: Must be "analysis"

    - name: tool
      type: object
      description: Metadata about the tool being analysed
      fields:
        - name: name
          type: string
          description: Tool name
          example: "MemGPT"
        - name: repo
          type: string
          format: url
          description: GitHub repository URL
          example: "https://github.com/cpacker/MemGPT"
        - name: version
          type: string
          description: vX.Y.Z or commit SHA when analysed
          example: "v0.3.17"
        - name: language
          type: string
          description: Primary implementation language
          example: "Python"
        - name: license
          type: string
          example: "MIT"

    - name: source
      type: string
      format: url
      description: GitHub URL of the tool repository (string, not array)
      example: "https://github.com/cpacker/MemGPT"

    - name: local_clone
      type: string
      description: Relative path to the vendored submodule
      example: "../tools/memgpt"

    - name: reviewed
      type: boolean
      description: Whether the tool has been reviewed
      example: true

    - name: reviewed_date
      type: date
      format: "YYYY-MM-DD"
      description: Date of review, or null if not yet reviewed
      example: "2026-04-13"

    - name: source_reviewed
      type: boolean
      description: True only if source code was read directly (not just README/docs)
      example: false

    - name: updated
      type: date
      format: "YYYY-MM-DD"
      description: Date of last update to this file
      example: "2026-04-13"

  optional_fields:
    - name: links
      type: array
      items: string
      description: Additional URLs (docs, npm, PyPI)

sections:
  required:
    - heading: "Summary"
      marker: "## Summary"
      description: >
        2–4 paragraph narrative. What the tool does, how it does it, and the
        single most important verified finding from source inspection.
        Correct any README claims contradicted by source here.

    - heading: "What it does"
      marker: "## What it does"
      description: >
        Source-confirmed description of the tool's mechanism. Use ### subsections
        for major subsystems. Mark unverified claims as (as reported).
      heading_variants:
        - "## What it does (verified from source)"
        - "## What it does (from reference documentation)"
        - "## What it does"

    - heading: "Benchmark claims"
      marker: "## Benchmark claims"
      description: >
        Table: Claim | Value | Scope | Assessment.
        Every row ends with (verified), (as reported), or (attempted — inconclusive).
      heading_variants:
        - "## Benchmark claims — verified vs as-reported"
        - "## Benchmark claims — as-reported vs verified"

    - heading: "Architectural assessment"
      marker: "## Architectural assessment"
      description: >
        ### Strengths and ### Weaknesses / risks sub-sections.
        Each item is a numbered bullet with a bold label.

    - heading: "Recommendation"
      marker: "## Recommendation"
      description: >
        **Use when:** bullets — concrete conditions favouring adoption.
        **Avoid when:** bullets — disqualifying conditions.
        **vs <peer>:** one sentence per named peer (overlap + preference rule).

    - heading: "Comparison hooks (for ANALYSIS.md matrix)"
      marker: "## Comparison hooks (for ANALYSIS.md matrix)"
      description: >
        Bullet list of key facts for the ANALYSIS.md comparison matrix row.
        Required bullets: retrieval model / approach, token saving scope,
        storage, maintenance signal, source-corrected (if any).
        Optional: license risk, unique value, MCP status, language coverage.

  optional:
    - heading: "Source review"
      description: Date-stamped note on what source was read and when.

    - heading: "Open questions after source review"
      description: Gaps, risks, and unresolved claims from source inspection.

    - heading: "Triage claim review"
      description: Retrospective on claims made during the triage stage.

validation:
  script: "../../scripts/validate-analysis-tool.sh"
  required_checks:
    - "YAML frontmatter present and valid"
    - "Required fields: slug, title, date, type, tool, source, local_clone, reviewed, reviewed_date, source_reviewed, updated"
    - "type == analysis"
    - "slug matches filename stem after ANALYSIS-"
    - "slug follows author-or-org-tool-name pattern"
    - "tool.name and tool.repo present"
    - "local_clone is set when tool is vendored"
    - "Section ## Summary present"
    - "Section ## What it does present (prefix match)"
    - "Section ## Benchmark claims present (prefix match)"
    - "Section ## Architectural assessment present"
    - "Section ## Recommendation present"
    - "Section ## Comparison hooks (for ANALYSIS.md matrix) present"
    - "No unfilled angle-bracket placeholders"
