pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,cjs,mjs,ts,tsx,jsx,json,jsonc}"
      run: bunx @biomejs/biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    markdownlint:
      glob: "*.md"
      exclude: "{.context/**,docs/src/content/docs/tiles.md}"
      run: bunx markdownlint-cli2 --config .markdownlint-cli2.jsonc {staged_files}
      stage_fixed: true
    skill-artifacts:
      run: ./skills/agentic-harness/skill-quality-auditor/scripts/validate-skill-artifacts.sh {staged_files}
      stage_fixed: true
    readme-sync:
      glob: "{skills/**,cli/**,.context/audits/**}"
      run: bun cli/index.ts readme update && bunx markdownlint-cli2 --config .markdownlint-cli2.jsonc README.md && git add README.md docs/src/content/docs/tiles.md
      stage_fixed: true
    yamllint:
      glob: "*.{yml,yaml}"
      run: command -v yq >/dev/null 2>&1 && yq eval '.' {staged_files} >/dev/null
      stage_fixed: true
    shellcheck:
      glob: "*.sh"
      run: command -v shellcheck >/dev/null 2>&1 && shellcheck {staged_files}
      stage_fixed: true
    skill-frontmatter:
      glob: "skills/**/SKILL.md"
      run: bun cli/index.ts validate frontmatter {staged_files}
      stage_fixed: true
    tessl-lint:
      glob: "skills/**/SKILL.md"
      run: for f in {staged_files}; do dir=$(dirname "$f"); if [ -f "$dir/tile.json" ]; then bun run tessl:lint -- "$f" || exit 1; fi; done
      stage_fixed: true
    skill-validate:
      glob: "skills/**/SKILL.md"
      run: |
        rc=0
        for f in {staged_files}; do
          skill-validator validate structure --allow-dirs=evals "$(dirname "$f")"
          code=$?
          [ $code -eq 1 ] && rc=1
        done
        exit $rc
      stage_fixed: false
    cli-ts-conventions:
      glob: "cli/**/*.ts"
      run: bun cli/scripts/validate-ts-conventions.ts {staged_files}
      stage_fixed: false
    go-mod-tidy:
      glob: "tools/skill-auditor/**/*.go"
      run: cd tools/skill-auditor && go mod tidy
      stage_fixed: true

pre-push:
  commands:
    unit-tests:
      run: bun test cli/
    integration-tests:
      run: bunx cucumber-js
    skill-check:
      glob: "skills/**/SKILL.md"
      run: |
        rc=0
        for f in {push_files}; do
          skill-validator check --allow-dirs=evals --per-file "$(dirname "$f")"
          code=$?
          [ $code -eq 1 ] && rc=1
        done
        exit $rc
    skill-audit:
      glob: "skills/**/SKILL.md"
      run: |
        if [ ! -x bin/skill-auditor ]; then
          (cd tools/skill-auditor && go build -o ../../bin/skill-auditor .) || { echo "skill-auditor build failed; skipping local audit (CI enforces the gate)"; exit 0; }
        fi
        rc=0
        for f in {push_files}; do
          rel="$(dirname "$f")"; rel="${rel#skills/}"
          grade=$(bin/skill-auditor evaluate "$rel" --json 2>/dev/null | python3 -c "import sys,json;print(json.load(sys.stdin).get('grade','?'))" 2>/dev/null)
          case "$grade" in
            A|A+) echo "✅ $rel: $grade";;
            B+|B|C+|C) echo "⚠️  $rel: $grade (warning — CI non-blocking)";;
            *) echo "❌ $rel: ${grade:-?} (below C — blocked)"; rc=1;;
          esac
        done
        exit $rc
