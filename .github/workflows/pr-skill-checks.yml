name: PR Skill Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - "skills/**"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  tessl-lint:
    name: Tessl Skill Lint
    # Fork PRs run with a read-only GITHUB_TOKEN; skip entirely to avoid permission errors on comment steps
    # Also skip if the PR is no longer open (e.g. a queued run completing after merge)
    if: github.event.pull_request.state == 'open' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check for TESSL_TOKEN
        id: token-check
        env:
          TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
        run: |
          if [ -n "$TESSL_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        if: steps.token-check.outputs.present == 'true'
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        if: steps.token-check.outputs.present == 'true'
        run: bun install

      - name: Run tessl skill lint
        id: lint
        if: steps.token-check.outputs.present == 'true'
        env:
          TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
        run: |
          set +e

          # Find changed SKILL.md files and resolve their nearest tile.json directory
          CHANGED=$(git diff --name-only --diff-filter=AM \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            -- 'skills/**/SKILL.md' 2>/dev/null || true)

          TILE_DIRS=""
          for skill_md in $CHANGED; do
            dir=$(dirname "$skill_md")
            while [ "$dir" != "." ]; do
              if [ -f "$dir/tile.json" ]; then
                TILE_DIRS="$TILE_DIRS $dir"
                break
              fi
              dir=$(dirname "$dir")
            done
          done

          TILE_DIRS=$(echo "$TILE_DIRS" | tr ' ' '\n' | sort -u | grep -v '^$' || true)

          if [ -z "$TILE_DIRS" ]; then
            echo "No tiles to lint — no changed SKILL.md files with a tile.json found."
            echo "output=No tiles to lint." >> "$GITHUB_OUTPUT"
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          combined_output=""
          combined_exit=0
          for tile_dir in $TILE_DIRS; do
            out=$(tessl skill lint "$tile_dir" 2>&1)
            code=$?
            combined_output="${combined_output}=== ${tile_dir} ===\n${out}\n"
            [ $code -ne 0 ] && combined_exit=$code
          done

          set -e
          delimiter="$(openssl rand -hex 8)"
          {
            echo "output<<${delimiter}"
            printf "%b" "${combined_output}"
            echo "${delimiter}"
            echo "exit_code=${combined_exit}"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing lint comment
        id: find-lint-comment
        if: always()
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "## Tessl Skill Lint"

      - name: Post lint results as PR comment
        if: always()
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          comment-id: ${{ steps.find-lint-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Tessl Skill Lint

            ${{ steps.lint.conclusion == 'skipped' && '> ⏭️ Skipped — `TESSL_TOKEN` is not configured (fork PR or missing secret)' || steps.lint.outputs.exit_code == '0' && '> ✅ All checks passed' || '> ❌ Issues found — review the output below' }}

            <details>
            <summary>Lint output</summary>

            ```
            ${{ steps.lint.outputs.output }}
            ```

            </details>

      - name: Fail if lint failed
        if: steps.lint.conclusion != 'skipped' && steps.lint.outputs.exit_code != '0'
        run: exit 1

  tessl-review:
    name: Tessl Skill Review
    # Fork PRs run with a read-only GITHUB_TOKEN; skip entirely to avoid permission errors on comment steps
    # Also skip if the PR is no longer open (e.g. a queued run completing after merge)
    if: github.event.pull_request.state == 'open' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Check for TESSL_TOKEN
        id: token-check
        env:
          TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
        run: |
          if [ -n "$TESSL_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        if: steps.token-check.outputs.present == 'true'
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        if: steps.token-check.outputs.present == 'true'
        run: bun install

      - name: Run tessl skill review
        id: review
        if: steps.token-check.outputs.present == 'true'
        env:
          TESSL_TOKEN: ${{ secrets.TESSL_TOKEN }}
        run: |
          set +e

          # Find changed SKILL.md files and collect their directories
          CHANGED=$(git diff --name-only --diff-filter=AM \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            -- 'skills/**/SKILL.md' 2>/dev/null || true)

          SKILL_DIRS=$(echo "$CHANGED" | xargs -I{} dirname {} | sort -u | grep -v '^$' || true)

          if [ -z "$SKILL_DIRS" ]; then
            echo "No skills to review — no changed SKILL.md files found."
            echo "output=No skills to review." >> "$GITHUB_OUTPUT"
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          combined_output=""
          combined_exit=0
          for skill_dir in $SKILL_DIRS; do
            out=$(tessl skill review "$skill_dir" 2>&1)
            code=$?
            combined_output="${combined_output}=== ${skill_dir} ===\n${out}\n"
            [ $code -ne 0 ] && combined_exit=$code
          done

          set -e
          delimiter="$(openssl rand -hex 8)"
          {
            echo "output<<${delimiter}"
            printf "%b" "${combined_output}"
            echo "${delimiter}"
            echo "exit_code=${combined_exit}"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing review comment
        id: find-review-comment
        if: always()
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "## Tessl Skill Review"

      - name: Post review results as PR comment
        if: always()
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          comment-id: ${{ steps.find-review-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Tessl Skill Review

            ${{ steps.review.conclusion == 'skipped' && '> ⏭️ Skipped — `TESSL_TOKEN` is not configured (fork PR or missing secret)' || '' }}

            <details>
            <summary>Review output</summary>

            ```
            ${{ steps.review.outputs.output }}
            ```

            </details>

      - name: Fail if review failed
        if: steps.review.conclusion != 'skipped' && steps.review.outputs.exit_code != '0'
        run: exit 1

  request-eval-scenarios:
    name: Request Eval Scenarios from Copilot
    if: github.event.pull_request.state == 'open' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect added or modified skills
        id: skills
        run: |
          # Find SKILL.md / AGENTS.md files that were added or modified
          CHANGED=$(git diff --name-only --diff-filter=AM \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            -- 'skills/**/SKILL.md' 'skills/**/AGENTS.md' 2>/dev/null || true)

          if [ -z "$CHANGED" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # The skill root is the directory containing SKILL.md / AGENTS.md
          SKILL_DIRS=$(echo "$CHANGED" | xargs -I{} dirname {} | sort -u)

          delimiter="$(openssl rand -hex 8)"
          {
            echo "dirs<<${delimiter}"
            echo "${SKILL_DIRS}"
            echo "${delimiter}"
            echo "found=true"
          } >> "$GITHUB_OUTPUT"

      - name: Find existing eval request comment
        id: find-eval-comment
        if: steps.skills.outputs.found == 'true'
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "@github-copilot Please create evaluation scenarios"

      - name: Post Copilot eval scenario request
        if: steps.skills.outputs.found == 'true'
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        with:
          comment-id: ${{ steps.find-eval-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            @github-copilot Please create evaluation scenarios for the skill(s) added or modified in this PR.

            **Modified skills:**
            ${{ steps.skills.outputs.dirs }}

            For each skill, generate eval scenarios following the format in `.tessl/tiles/tessl-labs/tessl-skill-eval-scenarios/`. Place scenarios under `evals/scenario-N/task.md` within the skill's directory.
