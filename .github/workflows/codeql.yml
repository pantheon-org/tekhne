name: CodeQL

# GitHub-native static analysis (code scanning) for the TypeScript CLI and the
# Go tooling. Findings surface in the repository Security tab and as PR checks.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 03:27 UTC) to catch newly published advisories.
    - cron: "27 3 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: go
            build-mode: manual
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: tools/skill-auditor/go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # build-mode: manual — the Go module lives in a subdirectory, so build it
      # explicitly rather than relying on autobuild finding it from the root.
      - name: Build Go tooling
        if: matrix.language == 'go'
        run: go build ./...
        working-directory: tools/skill-auditor

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          category: "/language:${{ matrix.language }}"
