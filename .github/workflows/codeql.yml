name: CodeQL

# GitHub-native static analysis (code scanning) for the TypeScript CLI and
# Python scripts. Findings surface in the Security tab and as PR checks.
# Rust is not a CodeQL-supported language; the Rust workspace is covered by
# clippy in rust-ci.yml and the cargo-audit advisory scan.
#
# All languages run on every pull request. Per-language filtering was tried and
# reverted: the `main` ruleset's code_scanning merge protection requires each
# PR's CodeQL security analyses to match the configurations present on `main`
# (which scans all languages), so skipping a language on a PR produces a
# "configurations not found" block. See PR #126 for the failure this caused.

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 03:27 UTC) to catch newly published advisories.
    - cron: "27 3 * * 1"

permissions:
  contents: read

concurrency:
  # Supersede an in-flight run when the ref updates (e.g. a rebase), so
  # stale runs are cancelled instead of piling onto the shared API quota.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:${{ matrix.language }}"
