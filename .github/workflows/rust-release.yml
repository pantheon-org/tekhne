name: Rust Release (prototype)

# Per-tool tagged-release prototype (A1). Each tool releases independently on
# its own tag, e.g. `skill-auditor-v1.2.3`, proving the per-package release
# model early. This is a scaffold: it stays dormant until a binary crate and a
# validated cargo-dist config exist, at which point A5 regenerates it via
# `dist init`. No such tag is pushed before A5, so this does not run yet.

on:
  push:
    tags:
      - "*-v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install 1.96.1 --profile minimal
          rustup default 1.96.1

      - name: Install cargo-dist
        run: cargo install cargo-dist --version 0.28.0 --locked

      # Plan the release for the tool named by the tag prefix (e.g. the
      # `skill-auditor-v*` tag plans a skill-auditor release). Finalized in A5.
      - name: Plan release
        run: dist plan --tag "${GITHUB_REF_NAME}"
