name: Validate Skills

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - "skills/**"
  push:
    branches: [main]
    paths:
      - "skills/**"

permissions:
  contents: read

concurrency:
  # Supersede an in-flight run when the ref updates (e.g. a rebase), so
  # stale runs are cancelled instead of piling onto the shared API quota.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skill-validator:
    name: Skill Validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install skill-validator
        run: |
          go install github.com/agent-ecosystem/skill-validator/cmd/skill-validator@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Find changed skill dirs
        id: dirs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          DIRS=$(git diff --name-only --diff-filter=AM "$BASE...$HEAD" \
            -- 'skills/**/SKILL.md' 2>/dev/null \
            | xargs -I{} dirname {} \
            | sort -u \
            | tr '\n' ' ')

          echo "dirs=$DIRS" >> "$GITHUB_OUTPUT"
          [ -n "$DIRS" ] && echo "found=true" >> "$GITHUB_OUTPUT" || echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Validate changed skills
        if: steps.dirs.outputs.found == 'true'
        run: |
          set +e
          rc=0
          for dir in ${{ steps.dirs.outputs.dirs }}; do
            skill-validator check --allow-dirs=evals --emit-annotations --per-file "$dir"
            code=$?
            skill-validator check --allow-dirs=evals -o markdown "$dir" >> "$GITHUB_STEP_SUMMARY"
            # exit 1 = errors (blocking); exit 2 = warnings only (non-blocking)
            [ $code -eq 1 ] && rc=1
          done
          exit $rc

      - name: No skills changed
        if: steps.dirs.outputs.found == 'false'
        run: echo "No SKILL.md files changed — nothing to validate."
