name: Post-Merge Skill Maintenance

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "skills/**"

concurrency:
  group: post-merge-${{ github.event.pull_request.base.ref }}
  cancel-in-progress: false

jobs:
  update-readme-and-tiles:
    name: Update README and TILES
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install

      - name: Update README and TILES
        run: bun run readme:update

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add README.md docs/src/content/docs/tiles.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update README and TILES after PR #${{ github.event.pull_request.number }} [skip ci]"
            git push
          fi
