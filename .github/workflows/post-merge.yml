name: Post-Merge Skill Maintenance

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "skills/**"

concurrency:
  group: post-merge-${{ github.ref }}
  cancel-in-progress: false

jobs:
  request-quality-audit:
    name: Request Skill Quality Audit from Copilot
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect merged skills
        id: skills
        run: |
          CHANGED=$(git diff --name-only --diff-filter=AM \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.merge_commit_sha }}" \
            -- 'skills/**/SKILL.md' 'skills/**/AGENTS.md' 2>/dev/null || true)

          if [ -z "$CHANGED" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SKILL_DIRS=$(echo "$CHANGED" | xargs -I{} dirname {} | sort -u)

          delimiter="$(openssl rand -hex 8)"
          {
            echo "dirs<<${delimiter}"
            echo "${SKILL_DIRS}"
            echo "${delimiter}"
            echo "found=true"
          } >> "$GITHUB_OUTPUT"

      - name: Create quality audit issue for Copilot
        if: steps.skills.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          SKILL_DIRS: ${{ steps.skills.outputs.dirs }}
        run: |
          body_file=$(mktemp)
          cat > "$body_file" << 'BODY_TEMPLATE'
          PR #PR_NUMBER_PLACEHOLDER has been merged. @github-copilot please run the skill quality audit for the modified skills and commit the results.

          **Modified skills:**
          ```
          SKILL_DIRS_PLACEHOLDER
          ```

          **Steps:**
          1. Run `bun run audit:skill <path>` for each skill listed above (or `bun run audit:skills` for all)
          2. Verify the generated audit files under `.context/audits/`
          3. Commit and push the updated audit files with message: `chore: update skill quality audits after PR #PR_NUMBER_PLACEHOLDER`
          BODY_TEMPLATE

          sed -i "s/PR_NUMBER_PLACEHOLDER/${PR_NUMBER}/g" "$body_file"
          # Use awk to safely substitute SKILL_DIRS which may contain special characters
          awk -v dirs="$SKILL_DIRS" '{gsub(/SKILL_DIRS_PLACEHOLDER/, dirs)}1' "$body_file" > "${body_file}.tmp" && mv "${body_file}.tmp" "$body_file"

          gh issue create \
            --title "Skill quality audit — PR #${PR_NUMBER}: ${PR_TITLE}" \
            --body-file "$body_file"

  update-readme-and-tiles:
    name: Update README and TILES
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Update README and TILES
        run: bun run readme:update

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md TILES.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git pull --rebase origin main
            git commit -m "docs: update README and TILES after PR #${{ github.event.pull_request.number }} [skip ci]"
            git push
          fi
