name: Skill Audit Gate

# Runs on every PR to main (no path filter) so the required "Skill Audit"
# status check always reports a conclusion. PRs that change no skills are
# detected early and pass immediately without building the Rust tools; a path
# filter here would leave the required check unreported and block non-skill
# PRs forever.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  # Supersede an in-flight run when the ref updates (e.g. a rebase), so
  # stale runs are cancelled instead of piling onto the shared API quota.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skill-audit:
    name: Skill Audit
    # Fork PRs get a read-only token; skip to avoid comment-permission errors.
    if: github.event.pull_request.state == 'open' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Find changed skill dirs
        id: dirs
        run: |
          DIRS=$(git diff --name-only --diff-filter=AM \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
            -- 'skills/**/SKILL.md' 2>/dev/null \
            | xargs -I{} dirname {} | sort -u | tr '\n' ' ')
          echo "dirs=$DIRS" >> "$GITHUB_OUTPUT"
          [ -n "$DIRS" ] && echo "found=true" >> "$GITHUB_OUTPUT" || echo "found=false" >> "$GITHUB_OUTPUT"

      - name: No skills changed
        if: steps.dirs.outputs.found == 'false'
        run: echo "No SKILL.md changed — nothing to audit. Skill Audit passes."

      # skill-auditor bundles its own D1-D9 scoring with the skill-validator-rs
      # structural checks (both crates live in the Rust workspace). Only build
      # from source when there are skills to audit.
      #
      # rustup is preinstalled on GitHub-hosted runners; pin the toolchain to
      # match mise.toml and rust-ci.yml. Keep this version in sync with them.
      - name: Install Rust toolchain
        if: steps.dirs.outputs.found == 'true'
        run: |
          rustup toolchain install 1.96.1 --profile minimal
          rustup default 1.96.1

      - name: Build skill-auditor
        if: steps.dirs.outputs.found == 'true'
        run: cargo build --release --locked -p skill-auditor

      - name: Audit changed skills
        id: audit
        if: steps.dirs.outputs.found == 'true'
        run: |
          set +e
          rows=""
          fail=0
          for dir in ${{ steps.dirs.outputs.dirs }}; do
            rel="${dir#skills/}"
            json=$(target/release/skill-auditor evaluate "$rel" --json 2>/dev/null)
            grade=$(printf '%s' "$json" | jq -r '.grade // "?"' 2>/dev/null)
            total=$(printf '%s' "$json" | jq -r '.total // "?"' 2>/dev/null)
            [ -z "$grade" ] && grade="?"
            case "$grade" in
              A|A+) tier="✅ pass";;
              B+|B|C+|C) tier="⚠️ warning";;
              D|F) tier="❌ fail"; fail=1;;
              *) tier="❓ error"; fail=1;;
            esac
            rows="${rows}| \`${rel}\` | ${grade} | ${total}/140 | ${tier} |\n"
          done
          {
            echo "table<<AUDIT_EOF"
            printf '| Skill | Grade | Score | Tier |\n'
            printf '| --- | --- | --- | --- |\n'
            printf "%b" "$rows"
            echo "AUDIT_EOF"
            echo "fail=$fail"
          } >> "$GITHUB_OUTPUT"

      # The audit comment is cosmetic. Never let a transient comment-API
      # failure (e.g. installation-token rate limit) fail the required gate —
      # the verdict is decided by "Enforce gate" from the grade alone.
      - name: Find existing audit comment
        id: find-comment
        if: steps.dirs.outputs.found == 'true'
        continue-on-error: true
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "## Skill Audit"

      - name: Post audit comment
        if: steps.dirs.outputs.found == 'true'
        continue-on-error: true
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ## Skill Audit

            ${{ steps.audit.outputs.table }}

            **Gate:** 
            - ✅ pass = A / A+ (≥126)
            - ⚠️ warning = C – B+ (98–125, non-blocking)
            - ❌ fail = D / F (<98, blocks merge)

      - name: Enforce gate (fail on D/F)
        if: steps.dirs.outputs.found == 'true' && steps.audit.outputs.fail == '1'
        run: |
          echo "::error::One or more changed skills scored below C (D/F) or could not be audited. Raise them to at least grade C to pass; grade A for a green pass."
          exit 1
