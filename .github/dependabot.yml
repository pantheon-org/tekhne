version: 2

# Dependabot keeps dependencies and pinned GitHub Actions current.
#
# Strategy: minor and patch bumps are grouped into a single weekly PR per
# ecosystem to cut review noise; major bumps are raised individually so
# breaking changes get reviewed in isolation.
#
# Bun caveat: the `npm` ecosystem below updates the version ranges in each
# `package.json`, but Dependabot does not natively refresh Bun's `bun.lock`.
# After merging an npm update, run `bun install` locally (or let the mise
# `postinstall`/`enter` hook do it) to regenerate the lockfile.

updates:
  # Root workspace (CLI, Biome, cucumber, zod, ajv, cliffy, ...)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Wait 7 days after a release before opening an update PR, so a yanked or
    # compromised release has time to surface before we adopt it.
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Documentation site (Astro / Starlight)
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Wait 7 days after a release before opening an update PR, so a yanked or
    # compromised release has time to surface before we adopt it.
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "docs"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      docs-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Python research skills (requirements.txt under skills/documentation/research)
  - package-ecosystem: "pip"
    directories:
      - "/skills/documentation/research/*"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Wait 7 days after a release before opening an update PR, so a yanked or
    # compromised release has time to surface before we adopt it.
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      pip-minor-patch:
        # Collapse the same dependency across all research-skill directories
        # into one PR (e.g. a single `requests` bump instead of one per skill).
        group-by: dependency-name
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions (keeps the SHA pins in .github/workflows current)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Wait 7 days after a release before opening an update PR, so a yanked or
    # compromised release has time to surface before we adopt it.
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
